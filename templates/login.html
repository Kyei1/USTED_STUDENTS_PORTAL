<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>USTED Student Portal – Login</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a237e 0%, #283593 50%, #3949ab 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            margin-bottom: 8px;
        }

        .logo svg {
            width: 56px;
            height: 56px;
        }

        h1 {
            text-align: center;
            color: #1a237e;
            font-size: 1.6rem;
            margin-bottom: 4px;
        }

        .subtitle {
            text-align: center;
            color: #757575;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        /* Flash messages */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 20px;
        }
        .alert-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .alert-danger  { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .alert-warning { background: #fff8e1; color: #f57f17; border: 1px solid #ffe082; }
        .alert-info    { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #424242;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #212121;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            margin-bottom: 20px;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #3949ab;
            box-shadow: 0 0 0 3px rgba(57, 73, 171, 0.15);
        }

        button[type="submit"] {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #1a237e, #3949ab);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: opacity 0.2s, transform 0.1s;
        }

        button[type="submit"]:hover  { opacity: 0.92; }
        button[type="submit"]:active { transform: scale(0.98); }

        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 0.8rem;
            color: #9e9e9e;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- University cap icon -->
        <div class="logo">
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M32 8L4 24l28 16 28-16L32 8z" fill="#1a237e"/>
                <path d="M12 32v14c0 4 9 10 20 10s20-6 20-10V32" stroke="#3949ab" stroke-width="3" stroke-linecap="round"/>
                <line x1="56" y1="24" x2="56" y2="40" stroke="#3949ab" stroke-width="3" stroke-linecap="round"/>
                <circle cx="56" cy="42" r="3" fill="#3949ab"/>
            </svg>
        </div>

        <h1>USTED Portal</h1>
        <p class="subtitle">Sign in with your student credentials</p>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}" novalidate>
            <label for="student_id">Student ID</label>
            <input
                type="text"
                id="student_id"
                name="student_id"
                placeholder="e.g. STU001"
                required
                autocomplete="username"
            />

            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
                autocomplete="current-password"
            />

            <button type="submit">Sign In</button>
        </form>

        <p class="footer-note">
            &copy; {{ 2026 }} USTED University. All rights reserved.
        </p>
    </div>
</body>
</html>
