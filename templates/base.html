<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{% block title %}USTED Portal{% endblock %}</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
		rel="stylesheet"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
		crossorigin="anonymous"
	>
	<style>
		:root {
			--usted-maroon: #7a0016;
			--usted-blue: #0f172a;
			--usted-gold: #dba111;
			--usted-green: #059669;
			--usted-bg: #f8f9fa;
		}

		body {
			font-family: "Manrope", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
			color: #1f2937;
			min-height: 100vh;
		}

		h1, h2, h3, h4, h5 {
			letter-spacing: -0.02em;
		}

		.main-nav {
			position: sticky;
			top: 0;
			z-index: 1040;
			background: #fff;
			border-bottom: 1px solid #e5e7eb;
			box-shadow: 0 6px 24px rgba(15, 23, 42, 0.05);
		}

		.brand-link {
			text-decoration: none;
			display: inline-flex;
			align-items: center;
			gap: 0.75rem;
		}

		.brand-mark {
			width: 44px;
			height: 44px;
			border-radius: 0.65rem;
			background: var(--usted-maroon);
			color: var(--usted-gold);
			display: inline-flex;
			align-items: center;
			justify-content: center;
			font-weight: 700;
			box-shadow: 0 8px 18px rgba(122, 0, 22, 0.25);
		}

		.brand-title {
			font-size: 1.35rem;
			line-height: 1;
			font-weight: 800;
			color: var(--usted-maroon);
			margin-bottom: 0.1rem;
		}

		.brand-subtitle {
			display: block;
			font-size: 0.65rem;
			letter-spacing: 0.15em;
			text-transform: uppercase;
			color: #6b7280;
			font-weight: 700;
		}

		.nav-link-themed {
			color: #374151;
			font-weight: 600;
			text-decoration: none;
			padding: 0.5rem 0.75rem;
			border-radius: 0.5rem;
			transition: all 0.2s ease;
		}

		.nav-link-themed:hover,
		.nav-link-themed:focus {
			color: var(--usted-maroon);
			background: rgba(122, 0, 22, 0.06);
		}

		.nav-highlight {
			font-size: 0.6rem;
			font-weight: 700;
			color: var(--usted-green);
			background: #d1fae5;
			border: 1px solid #a7f3d0;
			padding: 0.05rem 0.4rem;
			border-radius: 999px;
			margin-left: 0.35rem;
		}

		.profile-pill {
			width: 40px;
			height: 40px;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			border-radius: 50%;
			background: linear-gradient(135deg, var(--usted-gold), #efc553);
			color: #4a000d;
			font-weight: 800;
			box-shadow: 0 8px 18px rgba(219, 161, 17, 0.35);
		}

		.content-wrap {
			padding: 1.5rem 0;
		}

		.btn-gold {
			background: var(--usted-gold);
			color: #4a000d;
			font-weight: 800;
			border: 0;
		}

		.btn-gold:hover {
			background: #c9920f;
			color: #3a000a;
		}

		.hero-shell {
			background: var(--usted-maroon);
			box-shadow: 0 20px 40px rgba(122, 0, 22, 0.24);
			border-radius: 1rem;
			overflow: hidden;
		}

		.hero-shell .hero-note {
			background: rgba(219, 161, 17, 0.2);
			color: #f8d577;
			border: 1px solid rgba(219, 161, 17, 0.4);
		}

		.card-soft {
			border: 0;
			box-shadow: 0 12px 24px rgba(0, 0, 0, 0.06);
		}

		.notice-strip {
			background: #ecfdf5;
			color: #065f46;
			border: 1px solid #a7f3d0;
		}

		.form-control:focus {
			border-color: rgba(122, 0, 22, 0.45);
			box-shadow: 0 0 0 0.25rem rgba(122, 0, 22, 0.12);
		}

		@media (max-width: 991.98px) {
			.nav-menu {
				display: none;
				width: 100%;
				margin-top: 0.75rem;
				padding-top: 0.75rem;
				border-top: 1px solid #e5e7eb;
			}

			.nav-menu.show {
				display: block;
			}

			.nav-link-themed {
				display: block;
				margin-bottom: 0.35rem;
			}

			.nav-right {
				padding-top: 0.45rem;
			}
		}
	</style>
</head>
<body>
	<header class="main-nav">
		<div class="container-xxl py-3">
			<div class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
				<a href="{{ url_for('index') }}" class="brand-link">
					<span class="brand-mark">U</span>
					<span>
						<span class="brand-title">USTED</span>
						<span class="brand-subtitle">Student Portal</span>
					</span>
				</a>

				<button
					class="btn btn-outline-dark d-lg-none"
					type="button"
					id="menuToggle"
					aria-controls="navMenu"
					aria-expanded="false"
					aria-label="Toggle navigation"
				>
					Menu
				</button>

				<div id="navMenu" class="nav-menu d-lg-flex align-items-lg-center gap-lg-2 ms-lg-auto">
					<a href="{{ url_for('dashboard') if session.get('student_id') else url_for('login') }}" class="nav-link-themed">Dashboard</a>
					<a href="#" class="nav-link-themed">GPA Simulator</a>
					<a href="#" class="nav-link-themed">Portal Features</a>
					<a href="#" class="nav-link-themed">Helpdesk <span class="nav-highlight">New</span></a>

					<div class="d-flex align-items-center gap-2 nav-right">
						{% if session.get('student_id') %}
							<a href="{{ url_for('logout') }}" class="btn btn-sm" style="background: var(--usted-gold); color: #4a000d; font-weight: 700;">Log Out</a>
						{% else %}
							<a href="{{ url_for('login') }}" class="btn btn-sm" style="background: var(--usted-gold); color: #4a000d; font-weight: 700;">Student Login</a>
						{% endif %}
						<span class="profile-pill" aria-label="Profile">{{ session.get('first_name', 'U')[:1]|upper }}</span>
					</div>
				</div>
			</div>
		</div>
	</header>

	<main class="container-xxl content-wrap">
		<section>
			{% block content %}{% endblock %}
		</section>
	</main>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous"
	></script>
	<script>
		(function () {
			var menu = document.getElementById("navMenu");
			var toggle = document.getElementById("menuToggle");

			if (!menu || !toggle) {
				return;
			}

			toggle.addEventListener("click", function () {
				var isOpen = menu.classList.toggle("show");
				toggle.setAttribute("aria-expanded", String(isOpen));
			});
		})();
	</script>
</body>
</html>
